<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Back to School Poster Generator</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
        }
        .perspective-1000 { perspective: 1000px; }
        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        /* Hide scrollbars but keep functionality */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        amber: { 500: '#f59e0b' },
                        rose: { 500: '#f43f5e' }
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useCallback, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        // Custom Lucide Icon Component for Standalone
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (name && lucide) {
                    lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [name, setName] = useState('');
            const [school, setSchool] = useState('');
            const [image, setImage] = useState(null);
            const [isGenerating, setIsGenerating] = useState(false);
            const posterRef = useRef(null);

            const handleImageChange = (e) => {
                const file = e.target.files?.[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setImage(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const handleDownload = async () => {
                if (!posterRef.current) return;
                setIsGenerating(true);
                try {
                    const canvas = await html2canvas(posterRef.current, {
                        scale: 3,
                        useCORS: true,
                        backgroundColor: null,
                    });
                    const link = document.createElement('a');
                    link.href = canvas.toDataURL('image/png');
                    link.download = `BackToSchool_${name ? name.replace(/\s+/g, '_') : 'Poster'}.png`;
                    link.click();
                } catch (err) {
                    alert("Failed to generate poster.");
                } finally {
                    setIsGenerating(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="w-full py-6 px-4 glass sticky top-0 z-50 border-b shadow-sm">
                        <div className="max-w-6xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="bg-amber-500 p-2 rounded-xl text-white">
                                    <Icon name="sparkles" className="w-6 h-6" />
                                </div>
                                <h1 className="text-xl md:text-2xl font-black bg-gradient-to-r from-gray-900 to-gray-600 bg-clip-text text-transparent">
                                    Poster<span className="text-amber-500">Gen</span>
                                </h1>
                            </div>
                            <nav className="text-sm font-medium text-gray-500 hidden sm:block">
                                Welcome to the new academic year
                            </nav>
                        </div>
                    </header>

                    <main className="flex-grow w-full py-8 md:py-12">
                        <div className="max-w-4xl mx-auto text-center px-4 mb-4">
                            <h2 className="text-4xl md:text-5xl font-extrabold text-gray-900 mb-6 tracking-tight">
                                Create Your <span className="text-transparent bg-clip-text bg-gradient-to-r from-amber-500 to-rose-500">Back To School</span> Masterpiece
                            </h2>
                            <p className="text-lg text-gray-600 max-w-2xl mx-auto">
                                Welcome the new academic year with a personalized, high-resolution poster. Customize your details below and download instantly!
                            </p>
                        </div>

                        <div className="max-w-6xl mx-auto px-4 mt-8 grid grid-cols-1 lg:grid-cols-12 gap-10">
                            {/* Form */}
                            <div className="lg:col-span-5 space-y-8">
                                <div className="bg-white rounded-3xl p-8 shadow-xl border border-gray-100">
                                    <h2 className="text-2xl font-bold text-gray-900 mb-6">Customize Your Poster</h2>
                                    <div className="space-y-5">
                                        <div>
                                            <label className="block text-sm font-semibold mb-2 text-gray-700">Student Name</label>
                                            <div className="relative">
                                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                                                    <Icon name="user" />
                                                </div>
                                                <input
                                                    type="text"
                                                    value={name}
                                                    onChange={(e) => setName(e.target.value)}
                                                    placeholder="Enter full name"
                                                    className="w-full pl-11 pr-4 py-3 bg-gray-50 border rounded-xl focus:ring-2 focus:ring-amber-500 outline-none transition-all"
                                                />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold mb-2 text-gray-700">School Name</label>
                                            <div className="relative">
                                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                                                    <Icon name="graduation-cap" />
                                                </div>
                                                <input
                                                    type="text"
                                                    value={school}
                                                    onChange={(e) => setSchool(e.target.value)}
                                                    placeholder="Enter school name"
                                                    className="w-full pl-11 pr-4 py-3 bg-gray-50 border rounded-xl focus:ring-2 focus:ring-amber-500 outline-none transition-all"
                                                />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold mb-2 text-gray-700">Student Photo</label>
                                            {!image ? (
                                                <div className="flex flex-col items-center justify-center w-full h-48 border-2 border-dashed border-gray-300 rounded-xl bg-gray-50 hover:bg-white transition cursor-pointer">
                                                    <label className="flex flex-col items-center justify-center w-full h-full cursor-pointer">
                                                        <Icon name="upload-cloud" className="w-10 h-10 mb-3 text-gray-400" />
                                                        <p className="text-sm text-gray-500"><span className="font-semibold">Click to upload</span></p>
                                                        <input type="file" className="hidden" accept="image/*" onChange={handleImageChange} />
                                                    </label>
                                                </div>
                                            ) : (
                                                <div className="relative w-full h-48 rounded-xl overflow-hidden shadow-sm group">
                                                    <img src={image} className="w-full h-full object-cover" />
                                                    <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                                                        <button onClick={() => setImage(null)} className="bg-white text-red-500 p-2 rounded-full"><Icon name="x" /></button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    
                                    <div className="mt-8 border-t pt-6 space-y-4">
                                        <button 
                                            onClick={handleDownload}
                                            disabled={isGenerating}
                                            className="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-amber-500 to-orange-600 text-white py-3 px-6 rounded-xl font-bold shadow-lg shadow-orange-500/30 hover:shadow-orange-500/50 transition-all disabled:opacity-50"
                                        >
                                            <Icon name="download" />
                                            {isGenerating ? 'Generating...' : 'Download High-Res Poster'}
                                        </button>
                                        <div className="flex justify-center gap-4">
                                            <button className="bg-green-500 text-white p-3 rounded-full shadow-md"><Icon name="message-circle" /></button>
                                            <button className="bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-600 text-white p-3 rounded-full shadow-md"><Icon name="instagram" /></button>
                                            <button className="bg-blue-600 text-white p-3 rounded-full shadow-md"><Icon name="facebook" /></button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Preview */}
                            <div className="lg:col-span-7 flex justify-center items-start perspective-1000">
                                <div className="w-full max-w-[450px] sticky top-8">
                                    <h3 className="font-bold text-gray-700 flex items-center gap-2 mb-4">
                                        <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Live Preview
                                    </h3>
                                    <div className="bg-white p-4 rounded-3xl shadow-2xl border">
                                        {/* Canvas Area to Capture */}
                                        <div ref={posterRef} className="relative w-full aspect-[4/5] bg-slate-900 rounded-2xl overflow-hidden shadow-2xl text-white">
                                            {/* Decorative Background */}
                                            <div className="absolute top-0 right-0 w-64 h-64 bg-amber-500 rounded-full mix-blend-multiply filter blur-3xl opacity-30 pointer-events-none translate-x-1/3 -translate-y-1/3"></div>
                                            <div className="absolute bottom-0 left-0 w-80 h-80 bg-rose-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 pointer-events-none -translate-x-1/3 translate-y-1/3"></div>
                                            
                                            {/* Header */}
                                            <div className="absolute top-8 left-0 right-0 flex justify-center">
                                                <div className="bg-white/10 backdrop-blur-md px-6 py-2 rounded-full border border-white/20">
                                                    <h2 className="text-amber-400 font-bold tracking-widest uppercase text-xs">Back To School 2026</h2>
                                                </div>
                                            </div>

                                            {/* Quote */}
                                            <div className="absolute top-24 left-8 right-8 flex gap-3 italic">
                                                <Icon name="quote" className="text-amber-500/50 w-8 h-8" />
                                                <p className="text-white/90 text-lg font-medium leading-relaxed">
                                                    "Embrace the new academic year with passion and curiosity. Every day is a chance to learn, grow, and achieve greatness."
                                                </p>
                                            </div>

                                            {/* Bottom Profile Area */}
                                            <div className="absolute bottom-0 left-0 right-0 h-3/5 bg-gradient-to-t from-slate-950 via-slate-950/80 to-transparent flex flex-col items-center justify-end pb-12">
                                                <div className="relative w-48 h-48 mb-6">
                                                   <div className="absolute inset-0 bg-gradient-to-tr from-amber-400 to-rose-500 rounded-full blur-md opacity-50"></div>
                                                   <div className="w-full h-full rounded-full border-4 border-white overflow-hidden bg-slate-800 relative z-10 shadow-2xl">
                                                      {image ? <img src={image} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-slate-500">Photo</div>}
                                                   </div>
                                                </div>
                                                <div className="text-center">
                                                    <h1 className="text-4xl font-extrabold mb-1">{name || 'Student Name'}</h1>
                                                    <p className="text-amber-400 text-lg font-semibold uppercase tracking-wide">{school || 'School Name'}</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer className="w-full py-6 mt-auto bg-white border-t">
                        <div className="max-w-6xl mx-auto px-4 text-center">
                            <p className="text-xs text-gray-400 font-medium tracking-widest uppercase">Created by ADIL C</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
